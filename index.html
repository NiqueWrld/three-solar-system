<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body class="m-0 bg-black text-white">
    <canvas id="scene" class="fixed inset-0 w-screen h-screen block"></canvas>

    <!-- Scroll sections drive camera focus -->
    <div id="sections" class="relative z-10 pointer-events-none">
        <!-- Filled by JS -->
    </div>

    <!-- Flight mode UI -->
    <button id="flyBtn"
        class="fixed top-4 right-4 z-20 px-4 py-2 rounded-full bg-white/10 hover:bg-white/20 border border-white/20 text-sm tracking-widest uppercase backdrop-blur">
        Fly — F
    </button>
    <div id="hud" class="hidden fixed inset-0 z-20 pointer-events-none">
        <div class="absolute top-4 left-1/2 -translate-x-1/2 text-xs tracking-[0.3em] uppercase text-white/70">
            Flight Mode
        </div>
        <div class="absolute bottom-4 left-1/2 -translate-x-1/2 text-[11px] text-white/60 text-center leading-relaxed">
            <div>W / S — thrust   ·   A / D — yaw   ·   ↑ ↓ — pitch   ·   Q / E — roll</div>
            <div>Space / Shift — boost / brake   ·   Mouse — look (click canvas)   ·   F or Esc — exit</div>
        </div>
        <!-- Crosshair -->
        <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-6 h-6 border border-white/50 rounded-full"></div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        const canvas = document.getElementById('scene');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.position.set(0, 60, 160);

        const starCount = 8000;
        const positions = new Float32Array(starCount * 3);
        const colors = new Float32Array(starCount * 3);
        const sizes = new Float32Array(starCount);
        const phases = new Float32Array(starCount);

        const palette = [
            new THREE.Color(0xffffff),
            new THREE.Color(0xcfe2ff),
            new THREE.Color(0xfff4d6),
            new THREE.Color(0xffd1a4),
            new THREE.Color(0xa4c8ff)
        ];

        for (let i = 0; i < starCount; i++) {
            // Distribute in a sphere shell for a more natural look
            const r = 200 + Math.random() * 600;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            positions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
            positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            positions[i * 3 + 2] = r * Math.cos(phi);

            const c = palette[Math.floor(Math.random() * palette.length)];
            colors[i * 3]     = c.r;
            colors[i * 3 + 1] = c.g;
            colors[i * 3 + 2] = c.b;

            sizes[i] = Math.pow(Math.random(), 3) * 4 + 0.5;
            phases[i] = Math.random() * Math.PI * 2;
        }

        // Circular soft star sprite
        function makeStarTexture() {
            const size = 64;
            const c = document.createElement('canvas');
            c.width = c.height = size;
            const ctx = c.getContext('2d');
            const g = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
            g.addColorStop(0, 'rgba(255,255,255,1)');
            g.addColorStop(0.2, 'rgba(255,255,255,0.85)');
            g.addColorStop(0.5, 'rgba(255,255,255,0.25)');
            g.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, size, size);
            const tex = new THREE.CanvasTexture(c);
            tex.colorSpace = THREE.SRGBColorSpace;
            return tex;
        }

        const starGeometry = new THREE.BufferGeometry();
        starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        starGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        starGeometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
        starGeometry.setAttribute('aPhase', new THREE.BufferAttribute(phases, 1));

        const starMaterial = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uMap: { value: makeStarTexture() },
                uPixelRatio: { value: renderer.getPixelRatio() }
            },
            vertexShader: `
                attribute float aSize;
                attribute float aPhase;
                varying vec3 vColor;
                varying float vTwinkle;
                uniform float uTime;
                uniform float uPixelRatio;
                void main() {
                    vColor = color;
                    vTwinkle = 0.7 + 0.3 * sin(uTime * 2.0 + aPhase);
                    vec4 mv = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = aSize * uPixelRatio * (300.0 / -mv.z) * vTwinkle;
                    gl_Position = projectionMatrix * mv;
                }
            `,
            fragmentShader: `
                uniform sampler2D uMap;
                varying vec3 vColor;
                varying float vTwinkle;
                void main() {
                    vec4 tex = texture2D(uMap, gl_PointCoord);
                    if (tex.a < 0.01) discard;
                    gl_FragColor = vec4(vColor * vTwinkle, tex.a);
                }
            `,
            vertexColors: true,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);

        // --- Textures (jeromeetienne/threex.planets, public domain NASA-derived) ---
        const TEX_BASE = 'https://raw.githubusercontent.com/jeromeetienne/threex.planets/master/images/';
        const texLoader = new THREE.TextureLoader();
        const loadTex = (file) => {
            const t = texLoader.load(TEX_BASE + file);
            t.colorSpace = THREE.SRGBColorSpace;
            return t;
        };

        // --- Sun ---
        const sun = new THREE.Mesh(
            new THREE.SphereGeometry(8, 64, 64),
            new THREE.MeshBasicMaterial({ map: loadTex('sunmap.jpg') })
        );
        scene.add(sun);

        // Sun emits light in all directions. decay=0 keeps intensity constant
        // with distance so the outer planets (Neptune ~82u away) are still lit;
        // realistic 1/r² falloff would leave them invisibly dark at this scale.
        const sunLight = new THREE.PointLight(0xfff2cc, 3.0, 0, 0);
        sun.add(sunLight);
        // Very faint ambient so the night side isn't pitch black.
        scene.add(new THREE.AmbientLight(0x101820, 0.15));

        // Sun glow sprite
        const glowTex = (() => {
            const s = 256, c = document.createElement('canvas');
            c.width = c.height = s;
            const ctx = c.getContext('2d');
            const g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
            g.addColorStop(0, 'rgba(255,220,120,0.9)');
            g.addColorStop(0.3, 'rgba(255,160,60,0.35)');
            g.addColorStop(1, 'rgba(255,120,0,0)');
            ctx.fillStyle = g; ctx.fillRect(0,0,s,s);
            return new THREE.CanvasTexture(c);
        })();
        const glow = new THREE.Sprite(new THREE.SpriteMaterial({
            map: glowTex, color: 0xffffff, transparent: true,
            blending: THREE.AdditiveBlending, depthWrite: false
        }));
        glow.scale.set(30, 30, 1);
        sun.add(glow);

        // --- Planets ---
        // rotationHours = sidereal rotation period in Earth hours (negative = retrograde)
        const planetData = [
            { name: 'Mercury', radius: 0.6, distance: 14, map: 'mercurymap.jpg', speed: 1.6,  tilt: 0.03, rotationHours: 1407.6 },
            { name: 'Venus',   radius: 1.2, distance: 19, map: 'venusmap.jpg',   speed: 1.2,  tilt: 0.05, rotationHours: -5832.5 },
            { name: 'Earth',   radius: 1.3, distance: 25, map: 'earthmap1k.jpg', bump: 'earthbump1k.jpg', spec: 'earthspec1k.jpg', speed: 1.0, tilt: 0.41, rotationHours: 23.9345,
                moons: [
                    { name: 'Moon', radius: 0.35, distance: 2.5, color: 0xbfbfbf, speed: 2.0, map: 'moonmap1k.jpg', bump: 'moonbump1k.jpg', rotationHours: 655.72 }
                ]
            },
            { name: 'Mars',    radius: 0.9, distance: 31, map: 'marsmap1k.jpg',  speed: 0.8,  tilt: 0.44, rotationHours: 24.6229,
                moons: [
                    { name: 'Phobos', radius: 0.12, distance: 1.6, color: 0x8a7a6b, speed: 4.0, rotationHours: 7.65 },
                    { name: 'Deimos', radius: 0.09, distance: 2.2, color: 0x9a8a7b, speed: 2.6, rotationHours: 30.31 }
                ]
            },
            { name: 'Jupiter', radius: 3.8, distance: 44, map: 'jupitermap.jpg', speed: 0.45, tilt: 0.05, rotationHours: 9.9250,
                moons: [
                    { name: 'Io',       radius: 0.35, distance: 5.5, color: 0xe6d27a, speed: 2.5 },
                    { name: 'Europa',   radius: 0.32, distance: 6.7, color: 0xd9c9a3, speed: 1.8 },
                    { name: 'Ganymede', radius: 0.50, distance: 8.2, color: 0xa39079, speed: 1.3 },
                    { name: 'Callisto', radius: 0.46, distance: 9.8, color: 0x6f6557, speed: 0.9 }
                ]
            },
            { name: 'Saturn',  radius: 3.2, distance: 58, map: 'saturnmap.jpg',  speed: 0.33, tilt: 0.47, rotationHours: 10.656, ring: { inner: 4.2, outer: 7.0, map: 'saturnringcolor.jpg' },
                moons: [
                    { name: 'Titan',   radius: 0.55, distance: 9.5,  color: 0xd8a96a, speed: 1.2 },
                    { name: 'Rhea',    radius: 0.25, distance: 11.0, color: 0xcfcfcf, speed: 0.9 },
                    { name: 'Iapetus', radius: 0.22, distance: 12.8, color: 0x9c8a78, speed: 0.6 }
                ]
            },
            { name: 'Uranus',  radius: 2.2, distance: 70, map: 'uranusmap.jpg',  speed: 0.22, tilt: 1.71, rotationHours: -17.24,
                moons: [
                    { name: 'Titania', radius: 0.28, distance: 4.0, color: 0xb8b0a8, speed: 1.4 },
                    { name: 'Oberon',  radius: 0.26, distance: 5.0, color: 0xa89e94, speed: 1.0 }
                ]
            },
            { name: 'Neptune', radius: 2.1, distance: 82, map: 'neptunemap.jpg', speed: 0.17, tilt: 0.49, rotationHours: 16.11,
                moons: [
                    { name: 'Triton', radius: 0.32, distance: 4.2, color: 0xc8c0b8, speed: 1.5 }
                ]
            }
        ];

        const planets = [];
        for (const p of planetData) {
            const pivot = new THREE.Object3D();
            pivot.rotation.y = Math.random() * Math.PI * 2;
            scene.add(pivot);

            const matOpts = { map: loadTex(p.map), roughness: 0.9, metalness: 0.0 };
            if (p.bump) matOpts.bumpMap = loadTex(p.bump), matOpts.bumpScale = 0.05;
            if (p.spec) matOpts.roughnessMap = loadTex(p.spec);

            const mesh = new THREE.Mesh(
                new THREE.SphereGeometry(p.radius, 48, 48),
                new THREE.MeshStandardMaterial(matOpts)
            );
            mesh.position.x = p.distance;
            mesh.rotation.z = p.tilt;
            pivot.add(mesh);

            if (p.ring) {
                const ringGeo = new THREE.RingGeometry(p.ring.inner, p.ring.outer, 96);
                // Remap UVs so the ring texture is sampled radially
                const pos = ringGeo.attributes.position;
                const uv = ringGeo.attributes.uv;
                for (let i = 0; i < pos.count; i++) {
                    const x = pos.getX(i), y = pos.getY(i);
                    const r = Math.sqrt(x*x + y*y);
                    const u = (r - p.ring.inner) / (p.ring.outer - p.ring.inner);
                    uv.setXY(i, u, 0.5);
                }
                const ringTex = loadTex(p.ring.map);
                const ringMat = new THREE.MeshBasicMaterial({
                    map: ringTex, side: THREE.DoubleSide,
                    transparent: true, opacity: 0.9
                });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = Math.PI / 2;
                mesh.add(ring);
            }

            // Orbit line
            const orbitGeo = new THREE.BufferGeometry();
            const segs = 200;
            const orbitPts = new Float32Array((segs + 1) * 3);
            for (let i = 0; i <= segs; i++) {
                const a = (i / segs) * Math.PI * 2;
                orbitPts[i*3]     = Math.cos(a) * p.distance;
                orbitPts[i*3 + 1] = 0;
                orbitPts[i*3 + 2] = Math.sin(a) * p.distance;
            }
            orbitGeo.setAttribute('position', new THREE.BufferAttribute(orbitPts, 3));
            const orbit = new THREE.Line(orbitGeo, new THREE.LineBasicMaterial({
                color: 0xffffff, transparent: true, opacity: 0.12
            }));
            scene.add(orbit);

            // Moons
            const moons = [];
            if (p.moons) {
                for (const m of p.moons) {
                    const moonPivot = new THREE.Object3D();
                    moonPivot.rotation.y = Math.random() * Math.PI * 2;
                    // Slight inclination for variety
                    moonPivot.rotation.x = (Math.random() - 0.5) * 0.4;
                    mesh.add(moonPivot);

                    const moonMatOpts = { roughness: 0.95, metalness: 0.0 };
                    if (m.map) {
                        moonMatOpts.map = loadTex(m.map);
                    } else {
                        moonMatOpts.color = m.color;
                    }
                    if (m.bump) {
                        moonMatOpts.bumpMap = loadTex(m.bump);
                        moonMatOpts.bumpScale = 0.02;
                    }
                    const moonMesh = new THREE.Mesh(
                        new THREE.SphereGeometry(m.radius, 24, 24),
                        new THREE.MeshStandardMaterial(moonMatOpts)
                    );
                    moonMesh.position.x = m.distance;
                    moonPivot.add(moonMesh);

                    const moonOmega = m.rotationHours ? (2 * Math.PI) / (m.rotationHours * 3600) : 0;
                    moons.push({ pivot: moonPivot, mesh: moonMesh, speed: m.speed, omega: moonOmega, phase0: Math.random() * Math.PI * 2 });
                }
            }

            // Sidereal angular velocity (rad / sec of REAL time, scaled later by TIME_SCALE)
            const omega = p.rotationHours ? (2 * Math.PI) / (p.rotationHours * 3600) : 0;

            // Initial rotation phase. For Earth, sync to current UTC so the
            // prime meridian (longitude 0) faces the sun at 12:00 UTC.
            // Sun sits at origin and the planet at +X, so the sub-solar point
            // is the -X side of the planet => mesh.rotation.y = 0 means
            // texture's longitude 180 faces the sun. We offset accordingly.
            let phase0;
            if (p.name === 'Earth') {
                const now = new Date();
                const utcSeconds =
                    now.getUTCHours() * 3600 +
                    now.getUTCMinutes() * 60 +
                    now.getUTCSeconds();
                // Fraction of UTC day past noon (noon = sub-solar at lon 0).
                const frac = ((utcSeconds - 12 * 3600) / 86400 + 1) % 1;
                phase0 = -2 * Math.PI * frac;
            } else {
                phase0 = Math.random() * Math.PI * 2;
            }
            mesh.rotation.y = phase0;

            planets.push({ pivot, mesh, speed: p.speed, moons, radius: p.radius, name: p.name, omega, phase0 });
        }

        // Real-time would be too slow to perceive (Earth: 1 rev / 24 h).
        // Speed up by this factor while preserving correct RELATIVE rates.
        const TIME_SCALE = 3600; // 1 real second = 1 simulated hour

        // --- Asteroid belt (between Mars at 31 and Jupiter at 44) ---
        function makeAsteroidBelt(innerR, outerR, count, color) {
            const geo = new THREE.IcosahedronGeometry(1, 0);
            const mat = new THREE.MeshStandardMaterial({ color, roughness: 1, metalness: 0, flatShading: true });
            const mesh = new THREE.InstancedMesh(geo, mat, count);
            const dummy = new THREE.Object3D();
            const data = [];
            for (let i = 0; i < count; i++) {
                const r = innerR + Math.random() * (outerR - innerR);
                const a = Math.random() * Math.PI * 2;
                const y = (Math.random() - 0.5) * 0.6;
                const s = 0.05 + Math.pow(Math.random(), 3) * 0.35;
                const speed = 0.4 + Math.random() * 0.4; // belt orbital speed factor
                data.push({ r, a, y, s, speed,
                    rx: Math.random() * Math.PI, ry: Math.random() * Math.PI, rz: Math.random() * Math.PI });
                dummy.position.set(Math.cos(a) * r, y, Math.sin(a) * r);
                dummy.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                dummy.scale.setScalar(s);
                dummy.updateMatrix();
                mesh.setMatrixAt(i, dummy.matrix);
            }
            mesh.instanceMatrix.needsUpdate = true;
            return { mesh, data, dummy };
        }

        const asteroidBelt = makeAsteroidBelt(34, 41, 2200, 0x9a8470);
        scene.add(asteroidBelt.mesh);

        // Kuiper belt (beyond Neptune at 82)
        const kuiperBelt = makeAsteroidBelt(95, 115, 1800, 0x7a8a9a);
        scene.add(kuiperBelt.mesh);

        // --- Other star systems (nearby exoplanet systems, schematic) ---
        const otherSystems = [
            {
                name: 'Alpha Centauri',
                position: new THREE.Vector3(600, 20, -200),
                star: { radius: 9, color: 0xfff1c2, light: 0xfff1c2 },
                planets: [
                    { name: 'Proxima b', radius: 1.1, distance: 16, color: 0x8c5a3c, speed: 1.4, tilt: 0.2 },
                    { name: 'Proxima c', radius: 2.0, distance: 30, color: 0x5a8fb5, speed: 0.6, tilt: 0.1 }
                ]
            },
            {
                name: 'TRAPPIST-1',
                position: new THREE.Vector3(-700, -60, 350),
                star: { radius: 4, color: 0xff7a3a, light: 0xff7a3a },
                planets: [
                    { name: 'TRAPPIST-1b', radius: 0.7, distance: 8,  color: 0xa8825a, speed: 3.0, tilt: 0.05 },
                    { name: 'TRAPPIST-1c', radius: 0.8, distance: 11, color: 0xb89270, speed: 2.4, tilt: 0.05 },
                    { name: 'TRAPPIST-1d', radius: 0.6, distance: 14, color: 0x6f8aa8, speed: 1.9, tilt: 0.05 },
                    { name: 'TRAPPIST-1e', radius: 0.8, distance: 17, color: 0x4a78a8, speed: 1.5, tilt: 0.05 },
                    { name: 'TRAPPIST-1f', radius: 0.9, distance: 20, color: 0x4068a0, speed: 1.2, tilt: 0.05 },
                    { name: 'TRAPPIST-1g', radius: 1.0, distance: 24, color: 0x6090b0, speed: 0.95, tilt: 0.05 },
                    { name: 'TRAPPIST-1h', radius: 0.7, distance: 28, color: 0x90a8c0, speed: 0.75, tilt: 0.05 }
                ]
            },
            {
                name: 'Kepler-90',
                position: new THREE.Vector3(150, 80, 700),
                star: { radius: 11, color: 0xfff8e0, light: 0xfff8e0 },
                planets: [
                    { name: 'Kepler-90 b', radius: 1.2, distance: 14, color: 0xc97a5a, speed: 2.2, tilt: 0.1 },
                    { name: 'Kepler-90 c', radius: 1.2, distance: 18, color: 0xd6a37a, speed: 1.7, tilt: 0.1 },
                    { name: 'Kepler-90 i', radius: 1.3, distance: 23, color: 0xb88a6a, speed: 1.3, tilt: 0.1 },
                    { name: 'Kepler-90 d', radius: 2.9, distance: 30, color: 0xa89070, speed: 1.0, tilt: 0.1 },
                    { name: 'Kepler-90 e', radius: 2.7, distance: 38, color: 0x9aa6b8, speed: 0.8, tilt: 0.1 },
                    { name: 'Kepler-90 f', radius: 2.9, distance: 47, color: 0x7a90b0, speed: 0.6, tilt: 0.1 },
                    { name: 'Kepler-90 g', radius: 8.1, distance: 60, color: 0xd0b890, speed: 0.4, tilt: 0.05 },
                    { name: 'Kepler-90 h', radius: 11.3, distance: 78, color: 0xc9a86a, speed: 0.25, tilt: 0.05 }
                ]
            }
        ];

        const extraPlanets = []; // for animation
        const extraFocusTargets = [];

        for (const sys of otherSystems) {
            const root = new THREE.Object3D();
            root.position.copy(sys.position);
            scene.add(root);

            // Star
            const star = new THREE.Mesh(
                new THREE.SphereGeometry(sys.star.radius, 48, 48),
                new THREE.MeshBasicMaterial({ color: sys.star.color })
            );
            root.add(star);

            const starLight = new THREE.PointLight(sys.star.light, 2.0, 0, 0);
            star.add(starLight);

            const starGlow = new THREE.Sprite(new THREE.SpriteMaterial({
                map: glowTex, color: sys.star.color, transparent: true,
                blending: THREE.AdditiveBlending, depthWrite: false
            }));
            starGlow.scale.set(sys.star.radius * 4, sys.star.radius * 4, 1);
            star.add(starGlow);

            extraFocusTargets.push({ name: sys.name, mesh: star, radius: sys.star.radius, sunPos: sys.position });

            for (const p of sys.planets) {
                const pivot = new THREE.Object3D();
                pivot.rotation.y = Math.random() * Math.PI * 2;
                root.add(pivot);

                const pMesh = new THREE.Mesh(
                    new THREE.SphereGeometry(p.radius, 40, 40),
                    new THREE.MeshStandardMaterial({ color: p.color, roughness: 0.9, metalness: 0 })
                );
                pMesh.position.x = p.distance;
                pMesh.rotation.z = p.tilt;
                pivot.add(pMesh);

                // Orbit line
                const segs = 160;
                const pts = new Float32Array((segs + 1) * 3);
                for (let i = 0; i <= segs; i++) {
                    const a = (i / segs) * Math.PI * 2;
                    pts[i*3]     = Math.cos(a) * p.distance;
                    pts[i*3 + 2] = Math.sin(a) * p.distance;
                }
                const oGeo = new THREE.BufferGeometry();
                oGeo.setAttribute('position', new THREE.BufferAttribute(pts, 3));
                root.add(new THREE.Line(oGeo, new THREE.LineBasicMaterial({
                    color: 0xffffff, transparent: true, opacity: 0.08
                })));

                extraPlanets.push({ pivot, mesh: pMesh, speed: p.speed });
                extraFocusTargets.push({ name: p.name, mesh: pMesh, radius: p.radius, sunPos: sys.position });
            }
        }

        // --- Scroll-driven focus targets ---
        // Index 0 = wide solar-system overview, 1..N = each planet up close
        const focusTargets = [
            { name: 'Solar System', overview: true },
            ...planets.map(pl => ({ name: pl.name, mesh: pl.mesh, radius: pl.radius })),
            ...extraFocusTargets
        ];

        // Build scroll sections (one viewport-height per target)
        const sectionsEl = document.getElementById('sections');
        focusTargets.forEach((tgt, i) => {
            const sec = document.createElement('section');
            sec.className = 'h-screen flex items-end p-10';
            sec.innerHTML = `
                <div class="max-w-md">
                    <div class="text-xs uppercase tracking-[0.3em] text-white/50">${i === 0 ? 'Overview' : 'Planet ' + i + ' / ' + (focusTargets.length - 1)}</div>
                    <h1 class="text-5xl font-light mt-2">${tgt.name}</h1>
                </div>`;
            sectionsEl.appendChild(sec);
        });
        // Hint to scroll
        const hint = document.createElement('div');
        hint.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 text-white/60 text-xs tracking-widest uppercase animate-pulse pointer-events-none';
        hint.textContent = 'Scroll \u2193';
        document.body.appendChild(hint);

        const camPos = new THREE.Vector3().copy(camera.position);
        const camLook = new THREE.Vector3(0, 0, 0);
        const tmpA = new THREE.Vector3();
        const tmpB = new THREE.Vector3();

        function getFocus(target, outPos, outLook) {
            if (target.overview) {
                outPos.set(0, 60, 160);
                outLook.set(0, 0, 0);
                return;
            }
            target.mesh.getWorldPosition(outLook);
            const r = target.radius;
            const sunOrigin = target.sunPos || scene.position;
            // Place camera on the SUN-facing side of the planet so we see the lit hemisphere.
            const dir = tmpA.copy(outLook).sub(sunOrigin).normalize();
            outPos.copy(outLook)
                .addScaledVector(dir, -(r * 4 + 2))
                .add(tmpB.set(0, r * 1.5 + 1, 0));
        }

        const targetPos = new THREE.Vector3();
        const targetLook = new THREE.Vector3();
        const segPos = new THREE.Vector3();
        const segLook = new THREE.Vector3();
        const nextPos = new THREE.Vector3();
        const nextLook = new THREE.Vector3();

        // --- Collision colliders (sphere approximations) ---
        const colliders = [];
        colliders.push({ mesh: sun, radius: 8 });
        for (const pl of planets) {
            colliders.push({ mesh: pl.mesh, radius: pl.radius });
            for (const m of pl.moons) colliders.push({ mesh: m.mesh, radius: m.mesh.geometry.parameters.radius });
        }
        for (const tgt of extraFocusTargets) {
            colliders.push({ mesh: tgt.mesh, radius: tgt.radius });
        }
        const SHIP_RADIUS = 1.1;

        // --- Spaceship + flight controls ---
        // Procedural hull texture: subtle panel lines + rivets baked into canvas.
        function makeHullTexture() {
            const w = 512, h = 256;
            const c = document.createElement('canvas');
            c.width = w; c.height = h;
            const ctx = c.getContext('2d');
            // Brushed metal base
            const grad = ctx.createLinearGradient(0, 0, 0, h);
            grad.addColorStop(0, '#c8ced6');
            grad.addColorStop(0.5, '#9aa3ad');
            grad.addColorStop(1, '#6d747c');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);
            // Fine horizontal brush noise
            for (let i = 0; i < 6000; i++) {
                ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.04})`;
                ctx.fillRect(Math.random() * w, Math.random() * h, 2 + Math.random() * 6, 1);
            }
            // Panel lines
            ctx.strokeStyle = 'rgba(0,0,0,0.45)';
            ctx.lineWidth = 1;
            for (let x = 0; x < w; x += 64) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
            }
            for (let y = 0; y < h; y += 48) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
            }
            // Rivets
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            for (let x = 8; x < w; x += 16) {
                for (let y = 8; y < h; y += 48) {
                    ctx.beginPath(); ctx.arc(x, y, 1.1, 0, Math.PI * 2); ctx.fill();
                }
            }
            // Accent stripe
            ctx.fillStyle = '#e23a3a';
            ctx.fillRect(0, h * 0.42, w, 6);
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, h * 0.42 + 6, w, 2);
            const tex = new THREE.CanvasTexture(c);
            tex.colorSpace = THREE.SRGBColorSpace;
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            tex.anisotropy = 8;
            return tex;
        }
        const hullTex = makeHullTexture();

        const ship = new THREE.Group();

        // Fuselage (capsule along -Z forward)
        const fuselage = new THREE.Mesh(
            new THREE.CapsuleGeometry(0.32, 1.4, 8, 16),
            new THREE.MeshStandardMaterial({
                map: hullTex, metalness: 0.85, roughness: 0.35, envMapIntensity: 1
            })
        );
        fuselage.rotation.x = Math.PI / 2;
        ship.add(fuselage);

        // Nose cone
        const nose = new THREE.Mesh(
            new THREE.ConeGeometry(0.32, 0.7, 16),
            new THREE.MeshStandardMaterial({ color: 0x2a2a2a, metalness: 0.6, roughness: 0.4 })
        );
        nose.rotation.x = -Math.PI / 2;
        nose.position.z = -1.2;
        ship.add(nose);

        // Cockpit (tinted glass dome)
        const cockpit = new THREE.Mesh(
            new THREE.SphereGeometry(0.28, 24, 16, 0, Math.PI * 2, 0, Math.PI / 2),
            new THREE.MeshPhysicalMaterial({
                color: 0x66ccff, metalness: 0.1, roughness: 0.05,
                transmission: 0.6, transparent: true, opacity: 0.85,
                clearcoat: 1, clearcoatRoughness: 0.05
            })
        );
        cockpit.position.set(0, 0.18, -0.35);
        ship.add(cockpit);

        // Swept wings (horizontal, extending laterally; root at fuselage, tip swept back)
        const wingShape = new THREE.Shape();
        wingShape.moveTo(0, 0);            // root leading edge
        wingShape.lineTo(0, 0.9);          // root trailing edge
        wingShape.lineTo(1.4, 1.1);        // tip trailing edge
        wingShape.lineTo(1.4, 0.55);       // tip leading edge
        wingShape.lineTo(0, 0);
        const wingGeo = new THREE.ExtrudeGeometry(wingShape, { depth: 0.05, bevelEnabled: false });
        const wingMat = new THREE.MeshStandardMaterial({
            map: hullTex, metalness: 0.8, roughness: 0.4
        });
        const wingR = new THREE.Mesh(wingGeo, wingMat);
        // Lay flat in the XZ plane so the wing is horizontal (shape Y -> +Z = aft)
        wingR.rotation.x = Math.PI / 2;
        wingR.position.set(0.28, -0.02, -0.25);
        ship.add(wingR);
        const wingL = wingR.clone();
        wingL.scale.x = -1;
        wingL.position.x = -0.28;
        ship.add(wingL);

        // Vertical tail fin (sits on top of the tail, extends backward)
        const finShape = new THREE.Shape();
        finShape.moveTo(0, 0);             // base front
        finShape.lineTo(0.75, 0);          // base back
        finShape.lineTo(0.6, 0.65);        // top back
        finShape.lineTo(0.1, 0.55);        // top front
        finShape.lineTo(0, 0);
        const fin = new THREE.Mesh(
            new THREE.ExtrudeGeometry(finShape, { depth: 0.04, bevelEnabled: false }),
            wingMat
        );
        // Rotate so the shape's X maps to +Z (toward the tail) and Y stays up
        fin.rotation.y = -Math.PI / 2;
        fin.position.set(-0.02, 0.18, 0.1);
        ship.add(fin);

        // Twin engines + glow
        const engineMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, metalness: 0.9, roughness: 0.3 });
        const makeEngine = (x) => {
            const g = new THREE.Group();
            const housing = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.18, 0.45, 16), engineMat);
            housing.rotation.x = Math.PI / 2;
            g.add(housing);
            const glowMesh = new THREE.Mesh(
                new THREE.SphereGeometry(0.14, 16, 16),
                new THREE.MeshBasicMaterial({ color: 0x66ddff })
            );
            glowMesh.position.z = 0.22;
            g.add(glowMesh);
            const glowSprite = new THREE.Sprite(new THREE.SpriteMaterial({
                map: glowTex, color: 0x66ddff, transparent: true,
                blending: THREE.AdditiveBlending, depthWrite: false
            }));
            glowSprite.scale.set(1.2, 1.2, 1);
            glowSprite.position.z = 0.35;
            g.add(glowSprite);
            g.position.set(x, -0.05, 0.85);
            ship.add(g);
            return { group: g, glowMesh, glowSprite };
        };
        const engineR = makeEngine(0.32);
        const engineL = makeEngine(-0.32);
        const engineGlows = [engineR, engineL];

        // Start parked near Earth's orbit
        ship.position.set(25, 3, 6);
        ship.lookAt(0, 0, 0);
        scene.add(ship);

        // Restore ship transform from localStorage
        try {
            const saved = JSON.parse(localStorage.getItem('universe.ship') || 'null');
            if (saved && saved.p && saved.q) {
                ship.position.fromArray(saved.p);
                ship.quaternion.fromArray(saved.q);
            }
        } catch {}
        function saveShip() {
            try {
                localStorage.setItem('universe.ship', JSON.stringify({
                    p: ship.position.toArray(),
                    q: ship.quaternion.toArray()
                }));
            } catch {}
        }
        let lastShipSave = 0;
        window.addEventListener('beforeunload', saveShip);

        const keys = Object.create(null);
        let flightMode = false;
        let yawV = 0, pitchV = 0;
        const shipVelocity = new THREE.Vector3();
        const flyBtn = document.getElementById('flyBtn');
        const hud = document.getElementById('hud');

        function setFlightMode(on, { fromUser = true } = {}) {
            flightMode = on;
            hud.classList.toggle('hidden', !on);
            sectionsEl.classList.toggle('hidden', on);
            hint.classList.toggle('hidden', on);
            document.body.style.overflow = on ? 'hidden' : '';
            flyBtn.textContent = on ? 'Exit — F' : 'Fly — F';
            try { localStorage.setItem('universe.mode', on ? 'flight' : 'scroll'); } catch {}
            if (!on) saveShip();
            if (on && fromUser) {
                canvas.requestPointerLock?.();
            } else if (!on && document.pointerLockElement) {
                document.exitPointerLock();
            }
        }
        // Restore last mode (pointer lock needs a user gesture, so just set state).
        try {
            if (localStorage.getItem('universe.mode') === 'flight') {
                setFlightMode(true, { fromUser: false });
            }
        } catch {}
        flyBtn.addEventListener('click', () => setFlightMode(!flightMode));
        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyF') { setFlightMode(!flightMode); return; }
            if (e.code === 'Escape' && flightMode) { setFlightMode(false); return; }
            keys[e.code] = true;
        });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });
        canvas.addEventListener('mousemove', (e) => {
            if (!flightMode || document.pointerLockElement !== canvas) return;
            yawV   += -e.movementX * 0.0015;
            pitchV += -e.movementY * 0.0015;
        });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();
            starMaterial.uniforms.uTime.value = t;
            stars.rotation.y += 0.0002;

            sun.rotation.y += 0.002;
            const simSeconds = t * TIME_SCALE;
            for (const pl of planets) {
                pl.pivot.rotation.y += 0.003 * pl.speed;
                pl.mesh.rotation.y = pl.phase0 + pl.omega * simSeconds;
                for (const m of pl.moons) {
                    m.pivot.rotation.y += 0.01 * m.speed;
                    if (m.omega) {
                        m.mesh.rotation.y = m.phase0 + m.omega * simSeconds;
                    } else {
                        m.mesh.rotation.y += 0.03;
                    }
                }
            }
            for (const ep of extraPlanets) {
                ep.pivot.rotation.y += 0.003 * ep.speed;
                ep.mesh.rotation.y += 0.02;
            }

            // Asteroid belts: advance per-instance orbit & tumble
            for (const belt of [asteroidBelt, kuiperBelt]) {
                const { mesh, data, dummy } = belt;
                for (let i = 0; i < data.length; i++) {
                    const d = data[i];
                    d.a += 0.0006 * d.speed;
                    d.ry += 0.01 * d.speed;
                    dummy.position.set(Math.cos(d.a) * d.r, d.y, Math.sin(d.a) * d.r);
                    dummy.rotation.set(d.rx, d.ry, d.rz);
                    dummy.scale.setScalar(d.s);
                    dummy.updateMatrix();
                    mesh.setMatrixAt(i, dummy.matrix);
                }
                mesh.instanceMatrix.needsUpdate = true;
            }

            // Compute camera target from scroll position
            if (flightMode) {
                // --- Ship update ---
                // Rotational input (keys + accumulated mouse delta)
                const rotSpeed = 0.025;
                if (keys['KeyA']) yawV   += rotSpeed * 0.6;
                if (keys['KeyD']) yawV   -= rotSpeed * 0.6;
                if (keys['ArrowUp'])   pitchV += rotSpeed * 0.6;
                if (keys['ArrowDown']) pitchV -= rotSpeed * 0.6;
                let rollV = 0;
                if (keys['KeyQ']) rollV += rotSpeed;
                if (keys['KeyE']) rollV -= rotSpeed;
                ship.rotateY(yawV);
                ship.rotateX(pitchV);
                ship.rotateZ(rollV);
                yawV *= 0.85; pitchV *= 0.85;

                // Thrust along ship's local -Z (forward)
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(ship.quaternion);
                let thrust = 0;
                if (keys['KeyW']) thrust += 1;
                if (keys['KeyS']) thrust -= 0.6;
                const boost = keys['Space'] ? 4 : 1;
                shipVelocity.addScaledVector(forward, thrust * 0.05 * boost);
                if (keys['ShiftLeft'] || keys['ShiftRight']) shipVelocity.multiplyScalar(0.9);
                shipVelocity.multiplyScalar(0.985); // gentle damping
                ship.position.add(shipVelocity);

                // Collision resolution: keep ship outside every body's sphere.
                const cTmp = new THREE.Vector3();
                const nTmp = new THREE.Vector3();
                for (const c of colliders) {
                    c.mesh.getWorldPosition(cTmp);
                    const minDist = c.radius + SHIP_RADIUS;
                    const d = ship.position.distanceTo(cTmp);
                    if (d < minDist) {
                        nTmp.subVectors(ship.position, cTmp).normalize();
                        ship.position.copy(cTmp).addScaledVector(nTmp, minDist + 0.01);
                        // Remove inward velocity component; keep tangential, with energy loss.
                        const vDotN = shipVelocity.dot(nTmp);
                        if (vDotN < 0) shipVelocity.addScaledVector(nTmp, -vDotN * 1.6);
                        shipVelocity.multiplyScalar(0.7);
                    }
                }

                // Engine glow pulses with thrust
                const glowScale = 1 + Math.min(2.5, shipVelocity.length() * 4);
                for (const eg of engineGlows) {
                    eg.glowMesh.scale.setScalar(glowScale);
                    eg.glowSprite.scale.setScalar(1.2 * glowScale);
                }

                // --- Chase camera ---
                // Pull back further & punch FOV when going fast for a speed feel.
                const speed = shipVelocity.length();
                const speedT = Math.min(1, speed / 0.5);
                const baseOffset = new THREE.Vector3(0, 1.0, 4.0 + speedT * 2.0);
                const camOffset = baseOffset.applyQuaternion(ship.quaternion);
                targetPos.copy(ship.position).add(camOffset);
                // Look slightly ahead of the ship for a leading shot.
                targetLook.copy(ship.position).addScaledVector(forward, 6 + speedT * 4);

                // Frame-rate independent smoothing
                const dt = Math.min(0.05, clock.getDelta());
                const posK = 1 - Math.exp(-dt * 8);   // ~8 = position responsiveness
                const lookK = 1 - Math.exp(-dt * 12); // ~12 = aim responsiveness
                camPos.lerp(targetPos, posK);
                camLook.lerp(targetLook, lookK);

                // Smoothly blend camera "up" toward ship up so roll feels natural
                // without instantly snapping when the ship banks.
                const shipUp = new THREE.Vector3(0, 1, 0).applyQuaternion(ship.quaternion);
                camera.up.lerp(shipUp, 1 - Math.exp(-dt * 6)).normalize();

                camera.position.copy(camPos);
                camera.lookAt(camLook);

                // FOV punch on boost
                const targetFov = 60 + speedT * 18;
                camera.fov += (targetFov - camera.fov) * (1 - Math.exp(-dt * 5));
                camera.updateProjectionMatrix();

                // Throttled persistence of ship transform
                if (t - lastShipSave > 1) { saveShip(); lastShipSave = t; }
            } else {
                const maxScroll = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
                const progress = Math.min(1, Math.max(0, window.scrollY / maxScroll)) * (focusTargets.length - 1);
                const idx = Math.floor(progress);
                const frac = progress - idx;
                const a = focusTargets[idx];
                const b = focusTargets[Math.min(focusTargets.length - 1, idx + 1)];
                getFocus(a, segPos, segLook);
                getFocus(b, nextPos, nextLook);
                // Smoothstep blend between sections
                const s = frac * frac * (3 - 2 * frac);
                targetPos.lerpVectors(segPos, nextPos, s);
                targetLook.lerpVectors(segLook, nextLook, s);

                // Damp toward target each frame
                camPos.lerp(targetPos, 0.08);
                camLook.lerp(targetLook, 0.12);
                camera.position.copy(camPos);
                camera.up.set(0, 1, 0);
                camera.lookAt(camLook);
                if (camera.fov !== 60) { camera.fov = 60; camera.updateProjectionMatrix(); }
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
